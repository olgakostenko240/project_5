services:
  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - static_volume:/app/static
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env

  db:
    image: postgres:16.0
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env

  redis:
    image: redis:latest

  celery:
    build:
      context: .
    container_name: celery_worker
    command:
      bash -c "celery -A config worker --loglevel=INFO --pool=solo"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - db
      - redis

  celery_beat:
    build:
      context: .
    container_name: celery_beat
    command:
      bash -c "celery -A config beat --loglevel=INFO"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
      - celery


volumes:
  postgres_data:
  static_volume:
  redis_data: